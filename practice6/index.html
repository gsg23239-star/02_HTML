<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-cube brand-icon"></i>
            <h2>MyDash</h2>
        </div>
        <nav class="nav-menu">
          <a href="#" class="nav-item active">
            <i class="fa-regular fa-id-badge"></i>
            <span>profile Info</span>
          </a>
          <a href="#" class="nav-item">
              <i class="fa-solid fa-shield-halved"></i>
            <span>Account Security</span>
          </a>
          <a href="#" class="nav-item">
            <i class="fa-regular fa-bell"></i>
            <span>Notification</span>
          </a>
          <a href="#" class="nav-item">
            <i class="fa-solid fa-credit-card"></i>
            <span>Billing Details</span>
          </a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
          <div class="header-text">
              <h2>Profile Information</h2>
              <p>Update your photo and personal details</p>
          </div>
          <div class="user-shortcut">
              <i class="fa-solid fa-magnifying-glass"></i>
              <div class="user-avatar-small">A</div>
          </div>
        </header>
        <div class="content-wrapper">
            <form class="profile-form">
                <div class="avatar-section">
                    <div class="avatar-circle">A</div>
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-cloud-arrow-up"></i>Upload
                    </button>
                    <button class="btn btn-outline">
                        <i class="fa-solid fa-trash-can"></i>Remove
                    </button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="Firstname">First Name</label>
                        <input type="text" class="form-input" id="firstname"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" class="form-input" id="lastname"/>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="text" class="form-input" id="email" value="abc@abc.com" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phoneNumber">phone Number</label>
                        <input type="text" class="form-input" id="phoneNumber"/>
                    </div>
                </div>
                <div class="form-row">
                    <!-- 체크박스 들어가야 하는 자리-->
                    <div class="form-actions">
                        <label class="custom-checkbox-wrapper">
                            <input type="checkbox" class="hidden-checkbox" checked />
                            <div class="checkbox-box">
                                <div class="checkmark-icon"></div>
                            </div>
                            <span class="checkbox-label"> Receive updates and newsletters via email </span>
                        </label>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
