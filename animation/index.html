<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>CSS 애니메이션</h1>
    <h2>1. transform (hover 할 때)</h2>
    <p>각 상자에 마우스를 올리면 각기 다른 transform 효과가 적용됩니다.</p>

    <div class="flex">
        <div class="card">
            <span class="title">Translate</span>
            <span class="description">(Move)</span>
            <div class="box translate">Move Me</div>
        </div>
        <div class="card">
            <span class="title">slate</span>
            <span class="description">(resize)</span>
            <div class="box scale">Size Me</div>
        </div>
        <div class="card">
            <span class="title">rotate</span>
            <span class="description">(Spin)</span>
            <div class="box scale">Spin Me</div>
        </div>
        </div>
        <div class="card">
            <span class="title">Skew</span>
            <span class="description">(Slant)</span>
            <div class="box scale">Slant Me</div>
        </div>
        </div>
        <div class="card">
            <span class="title">origin</span>
            <span class="description">(pivot)</span>
            <div class="box origin">pivot Me</div>
        </div>
        </div>
        </div>
        <div class="card">
            <span class="title">opacity</span>
            <span class="description">(opacity)</span>
            <div class="box opacity">fade Me</div>
        </div>
    </div>
</div>
</body>
</html>
