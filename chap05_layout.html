<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="
background-color: #aaa;
padding: 50px;
/*
    padding-top, padding-right, padding-bottom, padding-left
*/
margin: 30px;
margin-bottom: 30px;
">이것은 div 입니다</div>
<div style="
background-color: #f30606;
padding: 100px 50px 10px 30px;
">이것은 div 입니다</div>
<div style="
background-color: #115bde;
padding-bottom:30px;
">이것은 div 입니다</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #ee0707;">1. content-box (기본값)</h3>
    <div style="
        width: 200px;
        height: 100px;
        border: 10px solid #72b493;
        background-color: #a04718;
    ">
        전체 너비 : 260px
    </div>
</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #ee0707;">2. border-box</h3>
    <div style="
            box-sizing: border-box;
            width: 200px;
            height: 100px;
            padding: 20px;
            border: 10px solid #72b493;
            background-color: #a04718;
    ">
            전체 너비 : 200px
     </div>
</div>
</body>
</html>
